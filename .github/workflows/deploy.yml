name: Deploy to GitHub Pages

on:
  # Deploy on push to main
  push:
    branches: [main]
  # Allow manual trigger (e.g., to refresh from Notion)
  workflow_dispatch:
  # Auto-refresh from Notion daily at 6am UTC (2am ET)
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Fabric images to Notion (one-time)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -n "$NOTION_TOKEN" ]; then
            node scripts/import-fabric-images.mjs
          fi
        continue-on-error: true

      - name: Fetch latest data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -n "$NOTION_TOKEN" ]; then
            node scripts/fetch-notion.mjs
          else
            echo "No NOTION_TOKEN set, skipping Notion fetch (using bundled data)"
          fi
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
